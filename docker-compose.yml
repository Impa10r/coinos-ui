version: "3.6"
services:
  ui:
    container_name: ui
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PUBLIC_COINOS_URL: "${PUBLIC_COINOS_URL}"
        PUBLIC_BTC: "${PUBLIC_BTC}"
        PUBLIC_DOMAIN: "${PUBLIC_DOMAIN}"
        PUBLIC_DOMAIN_TOR: "${PUBLIC_DOMAIN_TOR}"
        PUBLIC_DOMAIN_EXTRA: "${PUBLIC_DOMAIN_EXTRA}"
        PUBLIC_COINOS_NETWORK: "${PUBLIC_COINOS_NETWORK}"
        PUBLIC_COINOS_RELAY: "${PUBLIC_COINOS_RELAY}"
        PUBLIC_COINOS_PUBKEY: "${PUBLIC_COINOS_PUBKEY}"
        PUBLIC_EXPLORER: "${PUBLIC_EXPLORER}"
        PUBLIC_LIQUID_EXPLORER: "${PUBLIC_LIQUID_EXPLORER}"
        PUBLIC_RECAPTCHA_SITE_KEY: "${PUBLIC_RECAPTCHA_SITE_KEY}"
        PUBLIC_TELEGRAM_URL: "${PUBLIC_TELEGRAM_URL}"
    restart: always
    ports:
      - "5173:5173"
    environment:
      PORT: 5173
      ORIGIN: "${ORIGIN}"
      PUBLIC_COINOS_URL: "${PUBLIC_COINOS_URL}"
    extra_hosts:
      - host.docker.internal:host-gateway
networks:
  default:
    name: net
    external: true
