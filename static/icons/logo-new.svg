<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <clipPath id="clip-left">
      <rect x="0" y="0" width="50" height="100"/>
    </clipPath>
    <clipPath id="clip-right">
      <rect x="50" y="0" width="50" height="100"/>
    </clipPath>
  </defs>

  <!-- Inner circle: left=black, right=white -->
  <circle cx="50" cy="50" r="21" fill="#000" clip-path="url(#clip-left)"/>
  <circle cx="50" cy="50" r="21" fill="#fff" clip-path="url(#clip-right)"/>

  <!-- 4 sectors in ring r=21 to r=34, alternating white/black/white/black -->
  <!-- Top-right (top → right, CW): white -->
  <path d="M 50,16 A 34,34 0 0,1 84,50 L 71,50 A 21,21 0 0,0 50,29 Z" fill="#fff"/>
  <!-- Bottom-right (right → bottom, CW): black -->
  <path d="M 84,50 A 34,34 0 0,1 50,84 L 50,71 A 21,21 0 0,0 71,50 Z" fill="#000"/>
  <!-- Bottom-left (bottom → left, CW): white -->
  <path d="M 50,84 A 34,34 0 0,1 16,50 L 29,50 A 21,21 0 0,0 50,71 Z" fill="#fff"/>
  <!-- Top-left (left → top, CW): black -->
  <path d="M 16,50 A 34,34 0 0,1 50,16 L 50,29 A 21,21 0 0,0 29,50 Z" fill="#000"/>

  <!-- Center white circle -->
  <circle cx="50" cy="50" r="10" fill="#fff"/>

  <!-- Strokes -->
  <circle cx="50" cy="50" r="10" fill="none" stroke="#000" stroke-width="1.2"/>
  <circle cx="50" cy="50" r="21" fill="none" stroke="#000" stroke-width="1.2"/>
  <circle cx="50" cy="50" r="34" fill="none" stroke="#000" stroke-width="1.2"/>
</svg>
